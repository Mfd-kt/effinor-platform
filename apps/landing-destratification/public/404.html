<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection...</title>
    <script>
        // Fallback pour SPA - redirige vers index.html avec le chemin original
        // Cette page est utilisée si .htaccess ne fonctionne pas correctement
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;
            
            // Si on est sur une route SPA, rediriger vers la page d'accueil
            // Le router React gérera ensuite la navigation
            if (path !== '/' && path !== '/index.html') {
                // Stocker le chemin original pour que React Router puisse le récupérer
                sessionStorage.setItem('spa_redirect_path', path + search + hash);
                // Rediriger vers la racine
                window.location.replace('/');
            }
        })();
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Chargement en cours...</p>
    </div>
    <noscript>
        <meta http-equiv="refresh" content="0;url=/">
        <p>Redirection vers la page d'accueil...</p>
    </noscript>
</body>
</html>
